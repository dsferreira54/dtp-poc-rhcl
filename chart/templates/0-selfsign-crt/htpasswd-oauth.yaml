{{- if .Values.htpasswd.enabled }}
---
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.htpasswd.jobNamespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: htpasswd-oauth
  namespace: {{ .Values.htpasswd.jobNamespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: htpasswd-oauth
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
rules:
  - apiGroups: ["config.openshift.io"]
    resources: ["oauths"]
    verbs: ["get", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: htpasswd-oauth
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: htpasswd-oauth
subjects:
  - kind: ServiceAccount
    name: htpasswd-oauth
    namespace: {{ .Values.htpasswd.jobNamespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: htpasswd-oauth
  namespace: openshift-config
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
    resourceNames: ["{{ .Values.htpasswd.secretName }}"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: htpasswd-oauth
  namespace: openshift-config
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: htpasswd-oauth
subjects:
  - kind: ServiceAccount
    name: htpasswd-oauth
    namespace: {{ .Values.htpasswd.jobNamespace }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: htpasswd-oauth
  namespace: {{ .Values.htpasswd.jobNamespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 6
  template:
    spec:
      serviceAccountName: htpasswd-oauth
      restartPolicy: OnFailure
      containers:
        - name: configure
          image: registry.redhat.io/openshift4/ose-cli:latest
          env:
            - name: IDP_NAME
              value: {{ .Values.htpasswd.identityProviderName | quote }}
            - name: SECRET_NAME
              value: {{ .Values.htpasswd.secretName | quote }}
          command:
            - /bin/bash
            - -ec
            - |
              if ! oc get secret "${SECRET_NAME}" -n openshift-config >/dev/null 2>&1; then
                echo "Error: secret ${SECRET_NAME} not found in openshift-config."
                exit 1
              fi

              python3 <<'PY'
              import json
              import os
              import subprocess

              idp_name = os.environ["IDP_NAME"]
              secret_name = os.environ["SECRET_NAME"]

              oauth = json.loads(subprocess.check_output(
                  ["oc", "get", "oauth", "cluster", "-o", "json"], universal_newlines=True
              ))

              provider = {
                  "name": idp_name,
                  "type": "HTPasswd",
                  "mappingMethod": "claim",
                  "htpasswd": {
                      "fileData": {
                          "name": secret_name,
                      }
                  },
              }

              providers = [
                  item for item in oauth["spec"].get("identityProviders", [])
                  if item.get("name") != idp_name
              ]
              oauth["spec"]["identityProviders"] = [provider] + providers
              oauth["metadata"] = {"name": "cluster"}

              subprocess.run(
                  ["oc", "apply", "-f", "-"],
                  input=json.dumps(oauth),
                  universal_newlines=True,
                  check=True,
              )
              PY

              echo "OAuth configured with HTPasswd identity provider '${IDP_NAME}' as the first provider."
{{- end }}
