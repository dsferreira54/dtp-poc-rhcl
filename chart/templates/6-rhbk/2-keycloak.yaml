---
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-bootstrap-admin
  namespace: {{ .Values.namespaces.rhbk }}
  annotations:
    argocd.argoproj.io/sync-wave: "24"
type: Opaque
stringData:
  username: admin
  password: redhat
---
apiVersion: k8s.keycloak.org/v2alpha1
kind: Keycloak
metadata:
  name: keycloak
  namespace: {{ .Values.namespaces.rhbk }}
  annotations:
    argocd.argoproj.io/sync-wave: "24"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  instances: 1
  bootstrapAdmin:
    user:
      secret: keycloak-bootstrap-admin
  db:
    vendor: postgres
    host: rhbk-pgsql
    port: 5432
    database: keycloak
    usernameSecret:
      name: keycloak-db-secret
      key: username
    passwordSecret:
      name: keycloak-db-secret
      key: password
  hostname:
    hostname: https://keycloak.{{ .Values.ingressDomain }}
  http:
    httpEnabled: true
  proxy:
    headers: xforwarded
  ingress:
    enabled: true
