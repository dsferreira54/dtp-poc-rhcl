---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-world-app
  namespace: {{ .Values.namespaces.exampleApps }}
  annotations:
    argocd.argoproj.io/sync-wave: "27"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hello-world-app
  template:
    metadata:
      labels:
        app: hello-world-app
    spec:
      containers:
      - name: hello-world-app-container
        image: docker.io/testcontainers/helloworld
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: hello-world-app
  namespace: {{ .Values.namespaces.exampleApps }}
  annotations:
    argocd.argoproj.io/sync-wave: "27"
spec:
  selector:
    app: hello-world-app
  type: ClusterIP
  ports:
    - name: http
      protocol: TCP
      port: 8080
      targetPort: 8080
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: hello-world-app
  namespace: {{ .Values.namespaces.exampleApps }}
  labels:
    app: hello-world-app
    deployment: hello-world-app
    service: hello-world-app
  annotations:
    argocd.argoproj.io/sync-wave: "28"
spec:
  parentRefs:
  - name: private-gateway
    namespace: istio-ingress
    sectionName: hello-world-app
  hostnames:
  - hello-world-app.{{ .Values.privategwDomain }}
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: hello-world-app
      port: 8080
---
apiVersion: extensions.kuadrant.io/v1alpha1
kind: OIDCPolicy
metadata:
  name: hello-world-app
  namespace: {{ .Values.namespaces.exampleApps }}
  annotations:
    argocd.argoproj.io/sync-wave: "30"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: hello-world-app
  provider:
    issuerURL: https://{{ .Values.namespaces.rhbk }}.{{ .Values.ingressDomain }}/realms/rhcl
    clientID: hello-world-app
    authorizationEndpoint: https://{{ .Values.namespaces.rhbk }}.{{ .Values.ingressDomain }}/realms/rhcl/protocol/openid-connect/auth
    tokenEndpoint: https://{{ .Values.namespaces.rhbk }}.{{ .Values.ingressDomain }}/realms/rhcl/protocol/openid-connect/token
    redirectURI: http://hello-world-app.{{ .Values.privategwDomain }}/auth/callback
  auth:
    tokenSource:
      cookie:
        name: jwt
---
apiVersion: kuadrant.io/v1
kind: RateLimitPolicy
metadata:
  name: hello-world-app
  namespace: {{ .Values.namespaces.exampleApps }}
  annotations:
    argocd.argoproj.io/sync-wave: "29"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  limits:
    my-limits:
      rates:
        - limit: 5
          window: 10s
  targetRef:
    group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: hello-world-app
