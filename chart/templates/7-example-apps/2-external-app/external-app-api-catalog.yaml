---
apiVersion: kuadrant.io/v1
kind: AuthPolicy
metadata:
  name: external-app
  namespace: {{ .Values.namespaces.exampleApps }}
  annotations:
    argocd.argoproj.io/sync-wave: "39"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: external-app
  rules:
    authentication:
      api-key-users:
        apiKey:
          allNamespaces: true
          selector:
            matchLabels:
              app: external-app
        credentials:
          queryString:
            name: apikey
---
apiVersion: extensions.kuadrant.io/v1alpha1
kind: PlanPolicy
metadata:
  name: external-app
  namespace: {{ .Values.namespaces.exampleApps }}
  annotations:
    argocd.argoproj.io/sync-wave: "39"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: external-app
  plans:
    - tier: default
      predicate: |
        has(auth.identity) && auth.identity.metadata.annotations["secret.kuadrant.io/plan-id"] == "default"
      limits:
        daily: 1000
---
apiVersion: devportal.kuadrant.io/v1alpha1
kind: APIProduct
metadata:
  name: external-app
  namespace: {{ .Values.namespaces.exampleApps }}
  annotations:
    argocd.argoproj.io/sync-wave: "40"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  displayName: External App API
  description: |
    External application API proxied through Connectivity Link to httpbin.org.
    Requires API key authentication for access.
  version: v1
  approvalMode: manual
  publishStatus: Published
  tags:
    - external
    - httpbin
    - example
  targetRef:
    group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: external-app
  contact:
    team: Platform Team
    email: platform@example.com
  documentation:
    docsURL: https://httpbin.org/
---
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.namespaces.externalAppConsumers }}
  annotations:
    argocd.argoproj.io/sync-wave: "41"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: api-owner-example-apps
  namespace: {{ .Values.namespaces.exampleApps }}
  annotations:
    argocd.argoproj.io/sync-wave: "42"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: api-owner
subjects:
  - kind: Group
    name: system:authenticated
    apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: api-consumer-external-app-consumers
  namespace: {{ .Values.namespaces.externalAppConsumers }}
  annotations:
    argocd.argoproj.io/sync-wave: "42"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: api-consumer
subjects:
  - kind: Group
    name: system:authenticated
    apiGroup: rbac.authorization.k8s.io
