---
apiVersion: v1
kind: ConfigMap
metadata:
  name: blue-app-source
  namespace: {{ .Values.namespaces.exampleApps }}
  annotations:
    argocd.argoproj.io/sync-wave: "34"
data:
  client.py: |
    import time
    import urllib.request

    GATEWAY_URL = "http://main-gateway-istio.istio-ingress.svc.cluster.local/time"
    RED_APP_HOST = "red-app.{{ .Values.gwapiDomain }}"

    while True:
        try:
            request = urllib.request.Request(
                GATEWAY_URL,
                headers={"Host": RED_APP_HOST},
            )
            with urllib.request.urlopen(request, timeout=10) as response:
                current_time = response.read().decode()
            print(f"Red app says it is {current_time}", flush=True)
        except Exception as error:
            print(f"Error calling red-app: {error}", flush=True)

        time.sleep(5)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: blue-app
  namespace: {{ .Values.namespaces.exampleApps }}
  annotations:
    argocd.argoproj.io/sync-wave: "34"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: blue-app
  template:
    metadata:
      labels:
        app: blue-app
    spec:
      containers:
      - name: blue-app
        image: docker.io/library/python:3.12-alpine
        command:
        - python
        - /app/client.py
        volumeMounts:
        - name: app-source
          mountPath: /app
          readOnly: true
      volumes:
      - name: app-source
        configMap:
          name: blue-app-source
          defaultMode: 0755
