---
apiVersion: v1
kind: ConfigMap
metadata:
  name: blue-app-source
  namespace: {{ .Values.namespaces.exampleApps }}
  annotations:
    argocd.argoproj.io/sync-wave: "34"
data:
  client.py: |
    import base64
    import json
    import os
    import time
    import urllib.error
    import urllib.parse
    import urllib.request

    TOKEN_URL = os.environ["TOKEN_URL"]
    CLIENT_ID = os.environ["CLIENT_ID"]
    CLIENT_SECRET = os.environ["CLIENT_SECRET"]
    GATEWAY_URL = "http://private-gateway-istio.istio-ingress.svc.cluster.local/time"
    RED_APP_HOST = os.environ["RED_APP_HOST"]

    def get_access_token():
        credentials = f"{CLIENT_ID}:{CLIENT_SECRET}".encode()
        authorization = base64.b64encode(credentials).decode()
        body = urllib.parse.urlencode({"grant_type": "client_credentials"}).encode()
        request = urllib.request.Request(
            TOKEN_URL,
            data=body,
            method="POST",
            headers={
                "Content-Type": "application/x-www-form-urlencoded",
                "Authorization": f"Basic {authorization}",
            },
        )
        with urllib.request.urlopen(request, timeout=10) as response:
            payload = json.load(response)
        return payload["access_token"]

    while True:
        try:
            access_token = get_access_token()
            request = urllib.request.Request(
                GATEWAY_URL,
                headers={
                    "Host": RED_APP_HOST,
                    "Authorization": f"Bearer {access_token}",
                },
            )
            with urllib.request.urlopen(request, timeout=10) as response:
                current_time = response.read().decode()
            print(f"Red app says it is {current_time}", flush=True)
        except Exception as error:
            print(f"Error calling red-app: {error}", flush=True)

        time.sleep(5)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: blue-app
  namespace: {{ .Values.namespaces.exampleApps }}
  annotations:
    argocd.argoproj.io/sync-wave: "38"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: blue-app
  template:
    metadata:
      labels:
        app: blue-app
    spec:
      containers:
      - name: blue-app
        image: docker.io/library/python:3.12-alpine
        command:
        - python
        - /app/client.py
        env:
        - name: TOKEN_URL
          value: https://{{ .Values.namespaces.rhbk }}.{{ .Values.ingressDomain }}/realms/rhcl/protocol/openid-connect/token
        - name: CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: red-app-consumer
              key: clientId
        - name: CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: red-app-consumer
              key: clientSecret
        - name: RED_APP_HOST
          value: red-app.{{ .Values.privategwDomain }}
        volumeMounts:
        - name: app-source
          mountPath: /app
          readOnly: true
      volumes:
      - name: app-source
        configMap:
          name: blue-app-source
          defaultMode: 0755
