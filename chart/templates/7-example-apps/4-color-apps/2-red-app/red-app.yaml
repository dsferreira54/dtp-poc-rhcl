---
apiVersion: v1
kind: ConfigMap
metadata:
  name: red-app-source
  namespace: {{ .Values.namespaces.exampleApps }}
  annotations:
    argocd.argoproj.io/sync-wave: "32"
data:
  server.py: |
    from datetime import datetime
    from http.server import BaseHTTPRequestHandler, HTTPServer

    class TimeHandler(BaseHTTPRequestHandler):
        def do_GET(self):
            if self.path not in ("/", "/time"):
                self.send_response(404)
                self.end_headers()
                return

            body = datetime.now().isoformat().encode()
            self.send_response(200)
            self.send_header("Content-Type", "text/plain; charset=utf-8")
            self.send_header("Content-Length", str(len(body)))
            self.end_headers()
            self.wfile.write(body)

        def log_message(self, format, *args):
            print(f"{self.address_string()} - {format % args}", flush=True)

    HTTPServer(("0.0.0.0", 8080), TimeHandler).serve_forever()
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: red-app
  namespace: {{ .Values.namespaces.exampleApps }}
  annotations:
    argocd.argoproj.io/sync-wave: "32"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: red-app
  template:
    metadata:
      labels:
        app: red-app
    spec:
      containers:
      - name: red-app
        image: docker.io/library/python:3.12-alpine
        command:
        - python
        - /app/server.py
        ports:
        - containerPort: 8080
        volumeMounts:
        - name: app-source
          mountPath: /app
          readOnly: true
      volumes:
      - name: app-source
        configMap:
          name: red-app-source
          defaultMode: 0755
---
apiVersion: v1
kind: Service
metadata:
  name: red-app
  namespace: {{ .Values.namespaces.exampleApps }}
  annotations:
    argocd.argoproj.io/sync-wave: "32"
spec:
  selector:
    app: red-app
  type: ClusterIP
  ports:
  - name: http
    protocol: TCP
    port: 8080
    targetPort: 8080
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: red-app
  namespace: {{ .Values.namespaces.exampleApps }}
  labels:
    app: red-app
    deployment: red-app
    service: red-app
  annotations:
    argocd.argoproj.io/sync-wave: "33"
spec:
  parentRefs:
  - name: main-gateway
    namespace: istio-ingress
  hostnames:
  - red-app.{{ .Values.gwapiDomain }}
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: red-app
      port: 8080
