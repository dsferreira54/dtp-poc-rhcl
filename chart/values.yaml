gwapiDomain: gwapi.ocp.acme.com
ingressDomain: apps.ocp.acme.com
rhclVersion: 1.4.1
namespaces:
  exampleApps: example-apps
  externalAppConsumers: external-app-consumers
  rhbk: rhbk
rhbk:
  helloWorldApp:
    clientId: hello-world-app
    clientSecret: hello-world-app-secret
    # IAM externo (ex.: GERID) — enabled: false = Keycloak embarcado; true = usa parameters abaixo
    externalIam:
      enabled: false
      parameters:
        jwksURL: "https://hiam.gerid.acme.com/cas/oidc/jwks"
        issuerURL: "https://hiam.gerid.acme.com/cas/oidc"
        authorizationEndpoint: "https://hiam.gerid.acme.com/cas/oidc/authorize"
        tokenEndpoint: "https://hiam.gerid.acme.com/cas/oidc/accessToken"
monitoring:
  userWorkload:
    enabled: true
  rhclMetrics:
    enabled: true
metallb:
  enabled: true
  ipAddressPool:
    addresses:
      - 192.168.1.240-192.168.1.250
ingress:
  selfSigned:
    enabled: false
    jobNamespace: ingress-selfsigned
    secretNamespace: openshift-ingress
    secretName: cert-manager-ingress-cert
    certificateName: cert-manager-ingress-cert
    routerNamespace: openshift-ingress
    routerDeployment: router-default
    validityDays: 90
htpasswd:
  enabled: false
  jobNamespace: ingress-selfsigned
  username: demo
  passwordHash: "$2y$05$LafNcbjVdORYJGDqvQ99x.KJKiI9jz7sMEuz9lpAHMCK868d3cnaK"
  secretName: htpasswd-demo
  identityProviderName: htpasswd-demo
  clusterAdminBindingName: htpasswd-demo-cluster-admin
authorino:
  trustIngressCA:
    enabled: false
    ingressSecretNamespace: openshift-ingress
    ingressSecretName: router-certs-default